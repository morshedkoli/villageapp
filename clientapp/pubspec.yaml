name: doulatpara
description: "Transparent village fund and development participation app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cloud_firestore: ^5.6.0
  firebase_auth: ^5.4.0
  firebase_core: ^3.10.0
  flutter_local_notifications: ^18.0.1
  fl_chart: ^0.69.2
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  intl: ^0.20.2
  google_sign_in: ^6.2.2
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
