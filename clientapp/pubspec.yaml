name: doulatpara
description: "Transparent village fund and development participation app."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cloud_firestore: ^6.5.0
  firebase_auth: ^6.5.2
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  fl_chart: ^1.2.0
  google_fonts: ^8.1.0
  image_picker: ^1.2.2
  intl: ^0.20.2
  google_sign_in: ^7.2.0
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  connectivity_plus: ^7.1.1
  rxdart: ^0.28.0
  url_launcher: ^6.3.2
  crypto: ^3.0.7
  http: ^1.6.0
  hive_flutter: ^1.1.0
  shimmer: ^3.0.0
  lottie: ^3.3.3
  go_router: ^17.3.0
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/login_animation.json
    - assets/village_animation.json
    - assets/charity_animation.json
